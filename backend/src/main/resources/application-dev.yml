spring:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/structured_clinical_assessment_tool_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

#
# 通义千问（DashScope）API，用于「AI 生成模板并开始问诊」等功能。
# 401 表示 Key 无效或未配置。获取 Key：阿里云控制台 -> DashScope -> API-KEY 管理。
# 本地开发推荐使用环境变量 QWEN_API_KEY 注入真实密钥。
qwen:
  api-key: ${QWEN_API_KEY:}
